{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva contraseña | Mondongo Games</title>

    <link rel="stylesheet" href="{% static 'games/css/login.css' %}">
    <link rel="stylesheet" href="{% static 'games/css/passwords.css' %}">
</head>
<body>

<div class="hero">
    <div class="hero-content">

        <!-- ===== TÍTULO ===== -->
        <div class="titulo-banner">
            <h1 class="titulo-principal">Mondongo.Games</h1>
            <p class="subtitulo">¡Tu Arcade Virtual Definitivo!</p>
            <p class="frase">Juega. Compite. Domina.</p>
        </div>

        <!-- ===== CAJA PASSWORD ===== -->
        <div class="auth-box password-box">

            <h2>Nueva contraseña</h2>

            <form method="POST">
                {% csrf_token %}

                {{ form.non_field_errors }}

                <div class="input-group">
                    <label>Nueva contraseña</label>
                    {{ form.new_password1 }}
                </div>

                <div class="input-group">
                    <label>Confirmar contraseña</label>
                    {{ form.new_password2 }}
                </div>

                <button type="submit" class="primary-btn">
                    Cambiar contraseña
                </button>
            </form>

        </div>
    </div>
</div>

<footer class="site-footer">
    <p>© 2026 MondongoGames. Todos los derechos reservados.</p>
</footer>

</body>
</html>
