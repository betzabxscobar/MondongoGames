		<style>
			
			/* Begin iOS 7 CSS */
		
			#ios7 {
				display: none;
			}
			
			
			@media only screen and (max-device-width: 767px){	
			
			#ios7 {
				margin: 0 auto;
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: url('assets/images/ios7-bg-fill.png'); 
				z-index: 1000;
			}
			
			#ios7 #box {
				width: 86%;
				height: 43%;
				margin: 2%;
				border: solid 1px white;
				border-radius: 5px;
				text-align: left;
				padding: 5%;
				overflow: hidden;
				display: table;
			}
			
			#ios7 #box #message {
				font-family: Matterhorn, Arial, Helvetica, sans-serif;
				font-size: 13.8pt;
				display: table-cell;
				vertical-align: middle;
				color: #ffffff;
				width: 100%;
				padding-top: 2%;
				height: 100px;
			}
			
			#ios7 #icon {
				float: left;
				margin: 3% 4%;
			}
			
			#ios7 #add-button {
				float: right;
				margin: 3% 4% 3% 0;
			}
			
			#ios7 #close-button {
				position: absolute;
				right: 17px;
				top: 18px;
			}
			
			#ios7 #options-button {
				position: relative;
				top: 2px;
				margin-top: -2px;
			}
			
			}
			
			
			@media only screen and (orientation: portrait) and (max-device-width: 767px){	
			
				#ios7 #box {
					height: 90%;
					text-align: center;
				}

				#ios7 #icon {
					margin: -100% 40% 0%;
					top: -10%;
					float: none;
					clear: both;
				}
				
				#ios7 #add-button {
					margin: 30% 40% -60%;
					float: none;
					clear: both;
				}
			}
			
			/* End iOS 7 CSS */
			
		</style>
		
		
		<link rel="stylesheet" href="assets/style.css" type="text/css" />
		
		<script>
			/* Begin iOS 7 Javascript */
				
				var ua = window.navigator.userAgent;
				var iOS7Phone = (ua.indexOf('OS 7') > -1 && (ua.indexOf('iPhone') > -1 || ua.indexOf('iPod') > -1));
				var standalone = (((window.outerHeight - window.innerHeight <= 20 || window.innerHeight == window.outerHeight) && (window.orientation == 90 || window.orientation == -90)) || ((window.orientation == 0 || window.orientation == 180) && window.outerHeight >= 480));
		
			
				if(iOS7Phone && !standalone){
					var ios7 = document.getElementById('ios7');
					ios7.style.display = 'block';
					ios7.ontouchstart = function(e){ ios7.style.display = 'none'; };
				}
			/* End iOS 7 Javascript */
		</script>
